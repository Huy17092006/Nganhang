<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Gesture Photo Effects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: #05060a; overflow: hidden; width: 100vw; height: 100vh; font-family: system-ui, sans-serif; }

  #container { position: relative; width: 100vw; height: 100vh; }

  #video {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1);   /* gương cho tự nhiên */
    opacity: 0.28;
    pointer-events: none;
  }

  #canvas {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    pointer-events: none;
  }

  /* nút thêm ảnh – tự ẩn, hiện lại khi di chuột */
  #upload-btn {
    position: absolute;
    bottom: 18px; right: 18px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.25);
    color: #fff;
    padding: 9px 16px;
    border-radius: 30px;
    cursor: pointer;
    font-size: 13px;
    backdrop-filter: blur(10px);
    transition: opacity .5s, background .2s;
    z-index: 100;
  }
  #upload-btn:hover { background: rgba(255,255,255,0.2); }
  #file-input { display: none; }

  /* ui mờ dần khi không tương tác */
  .idle #upload-btn { opacity: 0; }

  /* màn hình khởi động / báo lỗi camera */
  #boot {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    color: rgba(255,255,255,0.85);
    text-align: center; gap: 16px;
    z-index: 200;
    background: radial-gradient(circle at center, #0c1024 0%, #05060a 70%);
    transition: opacity .6s;
  }
  #boot.hidden { opacity: 0; pointer-events: none; }
  #boot h1 { font-size: 20px; font-weight: 600; letter-spacing: .5px; }
  #boot p { font-size: 13px; opacity: .6; max-width: 320px; line-height: 1.5; }
  .spinner {
    width: 38px; height: 38px;
    border: 3px solid rgba(255,255,255,0.15);
    border-top-color: #6aa8ff;
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #retry-btn {
    margin-top: 6px; padding: 9px 20px;
    background: #2a5cff; border: none; color: #fff;
    border-radius: 24px; cursor: pointer; font-size: 14px;
    display: none;
  }
</style>
</head>
<body>
<div id="container">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <button id="upload-btn">+ Thêm ảnh</button>
  <input type="file" id="file-input" accept="image/*" multiple>

  <div id="boot">
    <div class="spinner"></div>
    <h1>Đang khởi động camera &amp; AI…</h1>
    <p id="boot-msg">Vui lòng cho phép truy cập camera để bắt đầu.</p>
    <button id="retry-btn">Thử lại</button>
  </div>
</div>

<!-- MediaPipe via CDN -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/face_detection.js" crossorigin="anonymous"></script>

<script>
"use strict";

// ════════════════════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════════════════════
const DEFAULT_IMAGES = [
  'images/photo1.webp','images/photo2.webp','images/photo3.webp',
  'images/photo4.webp','images/photo5.webp','images/photo6.webp',
  'images/photo7.webp','images/photo8.jpg'
];
const MAX_SPRITES = 14;          // giới hạn số ảnh -> giữ độ trễ thấp
const W = () => window.innerWidth;
const H = () => window.innerHeight;

// ════════════════════════════════════════════════════════════════════════════
//  CANVAS
// ════════════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
function resizeCanvas(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width  = W() * dpr;
  canvas.height = H() * dpr;
  canvas.style.width  = W() + 'px';
  canvas.style.height = H() + 'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// ════════════════════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════════════════════
let images  = [];      // {img}
let sprites = [];       // hệ thống ảnh hợp nhất – mọi hiệu ứng đều tác động lên đây

let gesture = 'NONE';        // NONE | OPEN | PINCH | ONE | FIST | TWO | THREE
let prevGesture = 'NONE';
let hand = { visible:false, x:0.5, y:0.5, t:0 };  // vị trí bàn tay (đã đảo gương)
let pinchScale = 1;          // scale toàn cục khi pinch

// trail (1 ngón tay)
let trailPoints = [];        // {x,y,life}
let revealCount = 0;          // số ảnh đã "hiện dần" theo vệt sáng

// vortex/ball (nắm tay)
let ballEnergy = 0;          // 0..1 mức tụ năng lượng

// khuôn mặt
let face = { visible:false, x:0.5, y:0.35, size:0.25, t:0 };

let ringAngle = 0, spiralAngle = 0;

// ════════════════════════════════════════════════════════════════════════════
//  IMAGE LOADING
// ════════════════════════════════════════════════════════════════════════════
function loadImage(src){
  return new Promise(res=>{
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload  = ()=> res({img});
    img.onerror = ()=> res(null);
    img.src = src;
  });
}

async function loadDefaults(){
  const loaded = await Promise.all(DEFAULT_IMAGES.map(loadImage));
  images = loaded.filter(Boolean);
  buildSprites();
}

// ════════════════════════════════════════════════════════════════════════════
//  SPRITE SYSTEM  (một mảng ảnh, mọi hiệu ứng = đặt target rồi nội suy)
// ════════════════════════════════════════════════════════════════════════════
function buildSprites(){
  if (!images.length) return;
  const n = Math.min(images.length, MAX_SPRITES);
  // giữ lại sprite cũ nếu có để chuyển cảnh mượt
  const old = sprites;
  sprites = [];
  for (let i = 0; i < Math.max(n, images.length>MAX_SPRITES?MAX_SPRITES:images.length); i++){
    const prev = old[i];
    const base = 90 + (i % 4) * 30;
    sprites.push({
      img: images[i % images.length].img,
      x: prev ? prev.x : Math.random()*W(),
      y: prev ? prev.y : Math.random()*H(),
      scale: prev ? prev.scale : 0.2,
      rot:   prev ? prev.rot : (Math.random()-0.5)*0.4,
      alpha: prev ? prev.alpha : 0,
      baseW: base, baseH: base * 0.72,
      // tham số trôi tự nhiên
      wx: Math.random()*W(), wy: Math.random()*H(),
      vx: (Math.random()-0.5)*0.25, vy:(Math.random()-0.5)*0.25,
      phase: Math.random()*Math.PI*2,
      ringR: 0,
      revealed: false,
    });
  }
}

// thêm ảnh từ thư viện máy người dùng
function addUserImage(img){
  images.push({img});
  buildSprites();
}

// trôi tự nhiên (không có cử chỉ, không có mặt)
function wander(s, t){
  s.wx += s.vx + Math.sin(t*0.0004 + s.phase)*0.25;
  s.wy += s.vy + Math.cos(t*0.00035 + s.phase)*0.2;
  const m = 120;
  if (s.wx < -m) s.wx = W()+m;
  if (s.wx > W()+m) s.wx = -m;
  if (s.wy < -m) s.wy = H()+m;
  if (s.wy > H()+m) s.wy = -m;
}

// ════════════════════════════════════════════════════════════════════════════
//  GESTURE DETECTION  (21 landmarks, đã selfieMode nên toạ độ là góc nhìn gương)
// ════════════════════════════════════════════════════════════════════════════
function detectGesture(lm){
  // ngón duỗi: tip cao hơn (y nhỏ hơn) pip
  const ext = [
    Math.hypot(lm[4].x-lm[17].x, lm[4].y-lm[17].y) > Math.hypot(lm[2].x-lm[17].x, lm[2].y-lm[17].y), // ngón cái
    lm[8].y  < lm[6].y,
    lm[12].y < lm[10].y,
    lm[16].y < lm[14].y,
    lm[20].y < lm[18].y,
  ];
  const cnt = ext.filter(Boolean).length;
  const pinchDist = Math.hypot(lm[4].x-lm[8].x, lm[4].y-lm[8].y);
  const cx = lm[9].x, cy = lm[9].y;          // tâm lòng bàn tay

  // PINCH: cái + trỏ chạm nhau (ưu tiên cao -> phản hồi nhanh khi zoom)
  if (pinchDist < 0.06 && !ext[2] && !ext[3])
    return { name:'PINCH', x:(lm[4].x+lm[8].x)/2, y:(lm[4].y+lm[8].y)/2, dist:pinchDist };

  // FIST: nắm tay
  if (cnt === 0) return { name:'FIST', x:cx, y:cy };

  // OPEN: xoè 5 ngón -> ảnh xoay tròn
  if (cnt >= 4 && ext[1] && ext[2] && ext[3] && ext[4])
    return { name:'OPEN', x:cx, y:cy };

  // ONE: chỉ 1 ngón trỏ -> vệt sáng
  if (ext[1] && !ext[2] && !ext[3] && !ext[4])
    return { name:'ONE', x:lm[8].x, y:lm[8].y };

  // THREE: trỏ + giữa + áp út -> mưa ảnh
  if (ext[1] && ext[2] && ext[3] && !ext[4])
    return { name:'THREE', x:cx, y:cy };

  // TWO: trỏ + giữa (chữ V) -> thư viện xoắn ốc
  if (ext[1] && ext[2] && !ext[3] && !ext[4])
    return { name:'TWO', x:cx, y:cy };

  return { name:'NONE', x:cx, y:cy };
}

// ════════════════════════════════════════════════════════════════════════════
//  DRAW HELPERS
// ════════════════════════════════════════════════════════════════════════════
function drawSprite(s){
  if (s.alpha <= 0.01 || s.scale <= 0.01) return;
  const w = s.baseW * s.scale, h = s.baseH * s.scale;
  ctx.save();
  ctx.globalAlpha = Math.min(1, s.alpha);
  ctx.translate(s.x, s.y);
  ctx.rotate(s.rot);
  ctx.shadowBlur = 24;
  ctx.shadowColor = 'rgba(120,170,255,0.4)';
  // viền bo nhẹ
  ctx.drawImage(s.img, -w/2, -h/2, w, h);
  ctx.restore();
}

function lerp(a,b,k){ return a + (b-a)*k; }

// ════════════════════════════════════════════════════════════════════════════
//  MAIN LOOP
// ════════════════════════════════════════════════════════════════════════════
let lastT = performance.now();

function frame(now){
  requestAnimationFrame(frame);
  const dt = Math.min(50, now - lastT); lastT = now;
  ctx.clearRect(0,0,W(),H());

  const hx = hand.x * W(), hy = hand.y * H();
  const N = sprites.length || 1;

  // smooth pinch về 1 khi không pinch
  if (gesture !== 'PINCH') pinchScale = lerp(pinchScale, 1, 0.06);

  // năng lượng ball
  ballEnergy = lerp(ballEnergy, gesture==='FIST' ? 1 : 0, 0.12);

  // ── tính target cho từng sprite theo cử chỉ ──
  sprites.forEach((s, i)=>{
    let tx, ty, tscale = 1, talpha = 0.92, trot = s.rot;
    const k = 0.18;   // tốc độ nội suy

    switch (gesture){

      // 1) XOÈ BÀN TAY → ẢNH XOAY TRÒN quanh bàn tay
      case 'OPEN': {
        const ang = ringAngle + (i / N) * Math.PI * 2;
        const R = 150 + Math.sin(now*0.001)*30;
        tx = hx + Math.cos(ang) * R;
        ty = hy + Math.sin(ang) * R * 0.55;       // ellipse cho cảm giác 3D
        tscale = 0.85 + Math.sin(ang)*0.18;       // ảnh phía trước to hơn
        trot = lerp(s.rot, Math.sin(ang)*0.25, 0.2);
        break;
      }

      // 2) PINCH → PHÓNG TO / THU NHỎ (ảnh vẫn trôi quanh bàn tay)
      case 'PINCH': {
        wander(s, now);
        tx = lerp(s.x, hx + Math.cos(i)*120, 0.04);
        ty = lerp(s.y, hy + Math.sin(i)*90, 0.04);
        tscale = pinchScale;
        break;
      }

      // 3) MỘT NGÓN → vệt sáng + ảnh hiện dần dọc theo vệt
      case 'ONE': {
        if (i < revealCount && trailPoints.length){
          const p = trailPoints[Math.max(0, trailPoints.length-1 - i*3)] || trailPoints[0];
          tx = p.x + Math.cos(i*1.7)*60;
          ty = p.y + Math.sin(i*1.7)*60;
          tscale = 0.7;
          talpha = 0.95;
        } else {
          wander(s, now);
          tx = s.wx; ty = s.wy; talpha = 0.0;     // chưa tới lượt -> ẩn
        }
        break;
      }

      // 4) NẮM TAY → hút ảnh thành quả cầu năng lượng (vortex)
      case 'FIST': {
        const ang = now*0.004 + (i / N) * Math.PI * 2;
        const R = lerp(220, 30, ballEnergy) + (i%3)*8;
        tx = hx + Math.cos(ang) * R;
        ty = hy + Math.sin(ang) * R;
        tscale = lerp(0.9, 0.28, ballEnergy);
        trot = ang;
        break;
      }

      // 5) CHỮ V (2 ngón) → thư viện xoắn ốc
      case 'TWO': {
        const ang = spiralAngle + (i / N) * Math.PI * 3;
        const R = 40 + i * 26;
        tx = hx + Math.cos(ang) * R;
        ty = hy + Math.sin(ang) * R;
        tscale = lerp(0.4, 1.0, i / N);
        trot = ang * 0.5;
        break;
      }

      // 6) BA NGÓN → mưa ảnh rơi xuống
      case 'THREE': {
        s.wy += 4 + (i % 4);                       // rơi
        s.wx += Math.sin(now*0.002 + s.phase) * 1.2;
        if (s.wy > H() + 120){ s.wy = -120; s.wx = Math.random()*W(); }
        tx = s.wx; ty = s.wy; tscale = 0.8; trot = s.rot + 0.01;
        break;
      }

      // KHÔNG CỬ CHỈ → lơ lửng; nếu thấy MẶT thì bay quanh đầu
      default: {
        if (face.visible){
          const fx = face.x * W(), fy = face.y * H();
          const R = face.size * W() * (1.1 + (i%3)*0.35);
          const ang = ringAngle*0.6 + (i / N) * Math.PI * 2;
          tx = fx + Math.cos(ang) * R;
          ty = fy + Math.sin(ang) * R * 0.7 - face.size*W()*0.1;
          tscale = 0.45 + Math.sin(ang)*0.12;
          trot = lerp(s.rot, Math.sin(ang)*0.2, 0.1);
        } else {
          wander(s, now);
          tx = s.wx; ty = s.wy;
          tscale = 0.75;
          trot = s.rot + 0.0015;
        }
      }
    }

    // nội suy mượt -> độ trễ thị giác thấp nhưng không giật
    s.x = lerp(s.x, tx, k);
    s.y = lerp(s.y, ty, k);
    s.scale = lerp(s.scale, tscale, 0.14);
    s.alpha = lerp(s.alpha, talpha, 0.16);
    s.rot = trot;
  });

  // ── vẽ quả cầu năng lượng (nắm tay) phía dưới ảnh ──
  if (ballEnergy > 0.05){
    const r = lerp(40, 90, ballEnergy);
    const g = ctx.createRadialGradient(hx,hy,0, hx,hy, r);
    g.addColorStop(0,'rgba(150,200,255,'+(0.8*ballEnergy)+')');
    g.addColorStop(0.5,'rgba(80,120,230,'+(0.45*ballEnergy)+')');
    g.addColorStop(1,'rgba(40,60,180,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(hx,hy,r,0,Math.PI*2); ctx.fill();
  }

  // ── vẽ tất cả ảnh ──
  sprites.forEach(drawSprite);

  // ── vệt sáng (1 ngón tay) ──
  if (trailPoints.length > 1){
    ctx.save();
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    ctx.shadowBlur = 22; ctx.shadowColor = '#7ec8ff';
    for (let i = 1; i < trailPoints.length; i++){
      const a = i / trailPoints.length;
      ctx.strokeStyle = 'rgba(180,225,255,'+(a*0.85)+')';
      ctx.lineWidth = a * 14;
      ctx.beginPath();
      ctx.moveTo(trailPoints[i-1].x, trailPoints[i-1].y);
      ctx.lineTo(trailPoints[i].x, trailPoints[i].y);
      ctx.stroke();
    }
    ctx.restore();
  }
  // làm mờ dần vệt khi không còn vẽ
  if (gesture !== 'ONE' && trailPoints.length){
    trailPoints.forEach(p => p.life -= 0.05);
    trailPoints = trailPoints.filter(p => p.life > 0);
  }

  ringAngle  += 0.012;
  spiralAngle += 0.02;
}
requestAnimationFrame(frame);

// ════════════════════════════════════════════════════════════════════════════
//  MEDIAPIPE – HANDS
// ════════════════════════════════════════════════════════════════════════════
const videoEl = document.getElementById('video');

const hands = new Hands({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}` });
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,          // 0 = nhanh nhất -> độ trễ thấp nhất
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.5,
  selfieMode: true,
});

hands.onResults(res => {
  if (!res.multiHandLandmarks || !res.multiHandLandmarks.length){
    prevGesture = gesture;
    gesture = 'NONE';
    hand.visible = false;
    return;
  }
  hand.visible = true;
  const lm = res.multiHandLandmarks[0];
  const g = detectGesture(lm);
  prevGesture = gesture;
  gesture = g.name;

  // toạ độ đã selfieMode nên không cần đảo lại
  hand.x = g.x; hand.y = g.y;
  const sx = g.x * W(), sy = g.y * H();

  if (gesture === 'ONE'){
    trailPoints.push({ x:sx, y:sy, life:1 });
    if (trailPoints.length > 45) trailPoints.shift();
    trailPoints.forEach(p => p.life -= 0.012);
    trailPoints = trailPoints.filter(p => p.life > 0);
    if (prevGesture !== 'ONE') revealCount = 0;
    revealCount = Math.min(sprites.length, revealCount + 0.25); // ảnh hiện dần
  } else {
    revealCount = 0;
  }

  if (gesture === 'PINCH'){
    // map khoảng cách cái-trỏ -> scale (phản hồi tức thì)
    pinchScale = Math.max(0.35, Math.min(2.6, g.dist * 14));
  }
});

// ════════════════════════════════════════════════════════════════════════════
//  MEDIAPIPE – FACE DETECTION  (ảnh lơ lửng quanh đầu)
// ════════════════════════════════════════════════════════════════════════════
let faceDetection = null;
if (window.FaceDetection){
  faceDetection = new FaceDetection({ locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${f}` });
  faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.5, selfieMode: true });
  faceDetection.onResults(res => {
    if (res.detections && res.detections.length){
      const b = res.detections[0].boundingBox;
      face.visible = true;
      face.x = b.xCenter;
      face.y = b.yCenter;
      face.size = Math.max(b.width, b.height);
      face.t = performance.now();
    }
  });
}
// hết hạn khi không thấy mặt một lúc
setInterval(()=>{ if (performance.now() - face.t > 600) face.visible = false; }, 200);

// ════════════════════════════════════════════════════════════════════════════
//  CAMERA – tự truy cập, chạy hands mỗi frame, face cách quãng (giảm trễ)
// ════════════════════════════════════════════════════════════════════════════
const boot = document.getElementById('boot');
const bootMsg = document.getElementById('boot-msg');
const retryBtn = document.getElementById('retry-btn');
const spinner = document.querySelector('.spinner');
let frameCount = 0;

async function startCamera(){
  retryBtn.style.display = 'none';
  spinner.style.display = '';
  bootMsg.textContent = 'Đang xin quyền truy cập camera…';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:640}, height:{ideal:480}, facingMode:'user' },
      audio: false
    });
    videoEl.srcObject = stream;
    await videoEl.play();
    bootMsg.textContent = 'Đang tải mô hình AI…';

    const camera = new Camera(videoEl, {
      onFrame: async () => {
        frameCount++;
        await hands.send({ image: videoEl });               // ưu tiên tay – mỗi frame
        if (faceDetection && frameCount % 5 === 0){          // mặt – cách 5 frame
          await faceDetection.send({ image: videoEl });
        }
      },
      width: 640, height: 480
    });
    camera.start();

    // ẩn màn hình khởi động khi đã sẵn sàng
    setTimeout(()=> boot.classList.add('hidden'), 1200);
  } catch (e){
    spinner.style.display = 'none';
    bootMsg.textContent = 'Không thể truy cập camera: ' + (e && e.message ? e.message : e) +
                          '\nHãy kiểm tra quyền camera của trình duyệt.';
    retryBtn.style.display = 'inline-block';
    console.error(e);
  }
}
retryBtn.onclick = startCamera;

// ════════════════════════════════════════════════════════════════════════════
//  UPLOAD ẢNH TỪ THƯ VIỆN
// ════════════════════════════════════════════════════════════════════════════
document.getElementById('upload-btn').onclick = () => document.getElementById('file-input').click();
document.getElementById('file-input').onchange = e => {
  Array.from(e.target.files).forEach(file => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => { addUserImage(img); };
    img.src = url;
  });
  e.target.value = '';
};

// ════════════════════════════════════════════════════════════════════════════
//  TỰ ẨN UI khi không tương tác (ẩn hướng dẫn / nút khỏi màn hình)
// ════════════════════════════════════════════════════════════════════════════
let idleTimer = null;
function poke(){
  document.body.classList.remove('idle');
  clearTimeout(idleTimer);
  idleTimer = setTimeout(()=> document.body.classList.add('idle'), 3000);
}
['mousemove','touchstart','keydown'].forEach(ev => window.addEventListener(ev, poke));
poke();

// ════════════════════════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════════════════════════
loadDefaults();
startCamera();
</script>
</body>
</html>
