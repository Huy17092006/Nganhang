<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Gesture Effects</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; width: 100vw; height: 100vh; }
#container { position: relative; width: 100vw; height: 100vh; }
#video {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  object-fit: cover;
  transform: scaleX(-1);
  opacity: 0.85;
}
#canvas {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
}
#status {
  position: fixed; bottom: 16px; right: 16px;
  width: 10px; height: 10px; border-radius: 50%;
  background: #333;
  transition: background 0.3s;
}
#status.ready { background: #00ff88; box-shadow: 0 0 8px #00ff88; }
</style>
</head>
<body>
<div id="container">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="canvas"></canvas>
  <div id="status"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const statusDot = document.getElementById('status');

// ── Resize canvas ──────────────────────────────────────────────────────────
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ── Image sources ──────────────────────────────────────────────────────────
const IMG_SRCS = [
  'images/photo1.webp',
  'images/photo2.webp',
  'images/photo3.webp',
  'images/photo4.webp',
  'images/photo5.webp',
  'images/photo6.webp',
  'images/photo7.webp',
  'images/photo8.jpg'
];
const IMGS = [];
let imgsLoaded = 0;
IMG_SRCS.forEach((src, i) => {
  const img = new Image();
  img.src = src;
  img.onload = () => { imgsLoaded++; };
  IMGS[i] = img;
});

// ── Gesture state ──────────────────────────────────────────────────────────
let currentGesture = 'NONE';
let prevGesture = 'NONE';
let gestureFrames = 0;
const GESTURE_CONFIRM = 4; // frames to confirm gesture

// ── Effect particles / objects ─────────────────────────────────────────────
let particles = [];         // generic particle pool
let trailPoints = [];       // gesture 2: fingertip trail
let orbPhotos = [];         // gesture 1: burst photos
let orb = null;             // gesture 1: energy orb
let petalPhotos = [];       // gesture 3: peace – floating petals
let vortexPhotos = [];      // gesture 4: pinch – spiral vortex
let orbitPhotos = [];       // gesture 5: three fingers – orbit

let handX = 0.5, handY = 0.5;  // normalized [0,1] palm center
let indexX = 0, indexY = 0;    // px position of index tip
let prevIndexX = 0, prevIndexY = 0;
let trailAddTimer = 0;

// ── Utility ────────────────────────────────────────────────────────────────
function randImg() { return IMGS[Math.floor(Math.random() * IMGS.length)]; }
function lerpColor(a, b, t) { return Math.round(a + (b - a) * t); }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ── GESTURE 1 helpers ──────────────────────────────────────────────────────
function spawnOrb(px, py) {
  orb = { x: px, y: py, r: 0, maxR: 90, life: 1, phase: 'grow' };
  orbPhotos = [];
}
function burstOrb(px, py) {
  if (!orb) return;
  const cx = orb.x, cy = orb.y;
  for (let i = 0; i < 8; i++) {
    const ang = (Math.PI * 2 / 8) * i + Math.random() * 0.4;
    const spd = 5 + Math.random() * 6;
    orbPhotos.push({
      img: IMGS[i % IMGS.length],
      x: cx, y: cy,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 4,
      gravity: 0.18,
      rot: Math.random() * Math.PI * 2,
      rotV: (Math.random() - 0.5) * 0.12,
      w: 100 + Math.random() * 60,
      alpha: 1, life: 1
    });
  }
  orb = null;
}

// ── GESTURE 3 helpers ──────────────────────────────────────────────────────
function spawnPetals(px, py) {
  if (petalPhotos.length > 0) return;
  for (let i = 0; i < 8; i++) {
    const ang = Math.random() * Math.PI * 2;
    const r = 80 + Math.random() * 80;
    petalPhotos.push({
      img: IMGS[i % IMGS.length],
      ax: px + Math.cos(ang) * r,
      ay: py + Math.sin(ang) * r,
      phase: Math.random() * Math.PI * 2,
      speed: 0.012 + Math.random() * 0.01,
      radius: r,
      ang,
      w: 80 + Math.random() * 50,
      alpha: 0, life: 1
    });
  }
}

// ── GESTURE 4 helpers ──────────────────────────────────────────────────────
function spawnVortex(px, py) {
  if (vortexPhotos.length > 0) return;
  for (let i = 0; i < 8; i++) {
    const ang = (Math.PI * 2 / 8) * i;
    vortexPhotos.push({
      img: IMGS[i % IMGS.length],
      ang,
      r: 160 + Math.random() * 60,
      cx: px, cy: py,
      speed: 0.04 + Math.random() * 0.02,
      w: 75 + Math.random() * 40,
      alpha: 0, life: 1,
      shrink: false
    });
  }
}

// ── GESTURE 5 helpers ──────────────────────────────────────────────────────
function spawnOrbit(px, py) {
  if (orbitPhotos.length > 0) return;
  for (let i = 0; i < 8; i++) {
    const ang = (Math.PI * 2 / 8) * i;
    orbitPhotos.push({
      img: IMGS[i % IMGS.length],
      ang,
      r: 130,
      cx: px, cy: py,
      speed: 0.025,
      w: 70 + Math.random() * 30,
      alpha: 0, life: 1
    });
  }
}

// ── Draw Orb (gesture 1) ───────────────────────────────────────────────────
function drawOrb() {
  if (!orb) return;
  orb.r = Math.min(orb.r + 3, orb.maxR);
  const { x, y, r } = orb;

  const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
  grad.addColorStop(0, 'rgba(255,200,255,0.95)');
  grad.addColorStop(0.4, 'rgba(160,80,255,0.7)');
  grad.addColorStop(0.75, 'rgba(80,0,180,0.4)');
  grad.addColorStop(1, 'rgba(0,0,80,0)');

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle = grad;
  ctx.fill();

  // inner sparkle ring
  const t = Date.now() * 0.003;
  for (let i = 0; i < 12; i++) {
    const a = (Math.PI * 2 / 12) * i + t;
    const pr = r * 0.6 + Math.sin(t * 3 + i) * 10;
    const px2 = x + Math.cos(a) * pr;
    const py2 = y + Math.sin(a) * pr;
    ctx.beginPath();
    ctx.arc(px2, py2, 3, 0, Math.PI * 2);
    ctx.fillStyle = `hsla(${(i * 30 + t * 100) % 360},100%,80%,0.9)`;
    ctx.fill();
  }
  ctx.restore();
}

// ── Draw burst photos (gesture 1) ─────────────────────────────────────────
function updateOrbPhotos() {
  orbPhotos = orbPhotos.filter(p => p.alpha > 0.02);
  for (const p of orbPhotos) {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.vx *= 0.99;
    p.rot += p.rotV;
    p.life -= 0.007;
    p.alpha = Math.max(0, p.life);

    const h = (p.w * p.img.naturalHeight) / (p.img.naturalWidth || 1);
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.drawImage(p.img, -p.w / 2, -h / 2, p.w, h);
    ctx.restore();
  }
}

// ── Draw trail + trail photos (gesture 2) ─────────────────────────────────
function updateTrail() {
  if (trailPoints.length < 2) return;

  // glow trail
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 1; i < trailPoints.length; i++) {
    const p = trailPoints[i];
    const pp = trailPoints[i - 1];
    const age = 1 - p.age;
    ctx.beginPath();
    ctx.moveTo(pp.x, pp.y);
    ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = `hsla(${p.hue},100%,70%,${age * 0.9})`;
    ctx.lineWidth = age * 12;
    ctx.lineCap = 'round';
    ctx.stroke();
  }
  ctx.restore();

  // age out trail
  for (const p of trailPoints) p.age += 0.018;
  trailPoints = trailPoints.filter(p => p.age < 1);

  // trail images (stored inline in trailPoints with type='img')
  for (let i = trailPoints.length - 1; i >= 0; i--) {
    const p = trailPoints[i];
    if (p.type !== 'img') continue;
    const a = 1 - p.age;
    const sc = 0.3 + (1 - p.age) * 0.7;
    const w = p.w * sc;
    const h = (w * p.img.naturalHeight) / (p.img.naturalWidth || 1);
    ctx.save();
    ctx.globalAlpha = a * 0.9;
    ctx.translate(p.x, p.y);
    ctx.rotate(p.rot);
    ctx.drawImage(p.img, -w / 2, -h / 2, w, h);
    ctx.restore();
  }
}

// ── Draw petals (gesture 3) ────────────────────────────────────────────────
function updatePetals(px, py) {
  for (const p of petalPhotos) {
    p.ang += p.speed;
    p.cx = px; p.cy = py;
    const x = px + Math.cos(p.ang) * p.r;
    const y = py + Math.sin(p.ang) * p.r + Math.sin(p.phase + p.ang * 3) * 20;
    p.phase += 0.02;
    p.alpha = Math.min(1, p.alpha + 0.04);

    const h = (p.w * p.img.naturalHeight) / (p.img.naturalWidth || 1);
    ctx.save();
    ctx.globalAlpha = p.alpha * 0.9;
    ctx.translate(x, y);
    ctx.rotate(p.ang + Math.PI / 2);
    ctx.drawImage(p.img, -p.w / 2, -h / 2, p.w, h);
    ctx.restore();
  }
}

// ── Draw vortex (gesture 4) ────────────────────────────────────────────────
function updateVortex(px, py, active) {
  for (const p of vortexPhotos) {
    p.cx = px; p.cy = py;
    p.ang += p.speed;
    if (active) {
      p.r = Math.max(30, p.r - 0.8);
      p.alpha = Math.min(1, p.alpha + 0.05);
    } else {
      p.r += 1.5;
      p.alpha = Math.max(0, p.alpha - 0.03);
    }
    const x = px + Math.cos(p.ang) * p.r;
    const y = py + Math.sin(p.ang) * p.r;

    const h = (p.w * p.img.naturalHeight) / (p.img.naturalWidth || 1);
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(x, y);
    ctx.rotate(p.ang);
    ctx.drawImage(p.img, -p.w / 2, -h / 2, p.w, h);
    ctx.restore();
  }
  if (!active) {
    vortexPhotos = vortexPhotos.filter(p => p.alpha > 0.01);
  }
}

// ── Draw orbit (gesture 5) ─────────────────────────────────────────────────
function updateOrbit(px, py, active) {
  for (const p of orbitPhotos) {
    p.cx = px; p.cy = py;
    p.ang += p.speed;
    if (active) {
      p.alpha = Math.min(1, p.alpha + 0.04);
    } else {
      p.alpha = Math.max(0, p.alpha - 0.03);
    }
    const x = px + Math.cos(p.ang) * p.r;
    const y = py + Math.sin(p.ang) * p.r;

    // glow ring
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = p.alpha * 0.15;
    ctx.beginPath();
    ctx.arc(px, py, p.r, 0, Math.PI * 2);
    ctx.strokeStyle = '#aaf';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();

    const h = (p.w * p.img.naturalHeight) / (p.img.naturalWidth || 1);
    ctx.save();
    ctx.globalAlpha = p.alpha;
    ctx.translate(x, y);
    ctx.rotate(p.ang);
    ctx.drawImage(p.img, -p.w / 2, -h / 2, p.w, h);
    ctx.restore();
  }
  if (!active) {
    orbitPhotos = orbitPhotos.filter(p => p.alpha > 0.01);
  }
}

// ── Finger state helpers ───────────────────────────────────────────────────
function fingerExtended(lm, tip, pip) {
  return lm[tip].y < lm[pip].y;
}
function thumbExtended(lm) {
  return lm[4].x < lm[3].x; // mirrored
}
function pinchDist(lm) {
  const dx = lm[4].x - lm[8].x;
  const dy = lm[4].y - lm[8].y;
  return Math.sqrt(dx * dx + dy * dy);
}
function detect(lm) {
  const f1 = fingerExtended(lm, 8, 6);   // index
  const f2 = fingerExtended(lm, 12, 10); // middle
  const f3 = fingerExtended(lm, 16, 14); // ring
  const f4 = fingerExtended(lm, 20, 18); // pinky
  const th = thumbExtended(lm);
  const pd = pinchDist(lm);

  const count = [th, f1, f2, f3, f4].filter(Boolean).length;

  if (count === 0) return 'FIST';
  if (count === 5) return 'OPEN';
  if (f1 && !f2 && !f3 && !f4) return 'POINT';
  if (pd < 0.06 && !f2 && !f3 && !f4) return 'PINCH';
  if (f1 && f2 && !f3 && !f4) return 'PEACE';
  if (f1 && f2 && f3 && !f4) return 'THREE';
  return 'NONE';
}

// ── Main render loop ───────────────────────────────────────────────────────
let lastGesture = 'NONE';
let gestureCount = 0;
let confirmedGesture = 'NONE';

function render(landmarks) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  if (!landmarks || landmarks.length === 0) {
    // decay existing effects
    updateOrbPhotos();
    updateTrail();
    if (vortexPhotos.length) updateVortex(handX * canvas.width, handY * canvas.height, false);
    if (orbitPhotos.length) updateOrbit(handX * canvas.width, handY * canvas.height, false);
    if (petalPhotos.length) updatePetals(handX * canvas.width, handY * canvas.height);
    drawOrb();
    return;
  }

  const lm = landmarks[0];
  const W = canvas.width, H = canvas.height;

  // palm center (mirror)
  const px = (1 - lm[9].x) * W;
  const py = lm[9].y * H;
  handX = 1 - lm[9].x;
  handY = lm[9].y;

  // index tip (mirror)
  indexX = (1 - lm[8].x) * W;
  indexY = lm[8].y * H;

  const raw = detect(lm);

  // gesture confirmation
  if (raw === lastGesture) {
    gestureCount++;
  } else {
    gestureCount = 0;
    lastGesture = raw;
  }
  if (gestureCount >= GESTURE_CONFIRM) {
    confirmedGesture = raw;
  }

  // ── GESTURE 1: FIST / OPEN ───────────────────────────────────────────
  if (confirmedGesture === 'FIST') {
    if (!orb) spawnOrb(px, py);
    else { orb.x += (px - orb.x) * 0.2; orb.y += (py - orb.y) * 0.2; }
    petalPhotos = []; vortexPhotos = []; orbitPhotos = [];
    trailPoints = [];
  } else if (confirmedGesture === 'OPEN') {
    if (orb) burstOrb(px, py);
    petalPhotos = []; vortexPhotos = []; orbitPhotos = [];
    trailPoints = [];
  } else {
    if (orb) { orb = null; }
  }

  // ── GESTURE 2: POINT ─────────────────────────────────────────────────
  if (confirmedGesture === 'POINT') {
    petalPhotos = []; vortexPhotos = []; orbitPhotos = [];
    const hue = (Date.now() * 0.1) % 360;
    trailPoints.push({ x: indexX, y: indexY, age: 0, hue, type: 'trail' });

    trailAddTimer++;
    if (trailAddTimer % 18 === 0 && imgsLoaded > 0) {
      trailPoints.push({
        x: indexX, y: indexY, age: 0, hue,
        type: 'img',
        img: randImg(),
        w: 90 + Math.random() * 50,
        rot: (Math.random() - 0.5) * 0.6
      });
    }
  }

  // ── GESTURE 3: PEACE ─────────────────────────────────────────────────
  if (confirmedGesture === 'PEACE') {
    vortexPhotos = []; orbitPhotos = [];
    spawnPetals(px, py);
    updatePetals(px, py);
  } else if (petalPhotos.length && confirmedGesture !== 'PEACE') {
    for (const p of petalPhotos) {
      p.alpha -= 0.02;
      p.ang += p.speed;
      const x = px + Math.cos(p.ang) * p.r;
      const y = py + Math.sin(p.ang) * p.r;
      const h = (p.w * p.img.naturalHeight) / (p.img.naturalWidth || 1);
      ctx.save();
      ctx.globalAlpha = Math.max(0, p.alpha);
      ctx.translate(x, y);
      ctx.rotate(p.ang + Math.PI / 2);
      ctx.drawImage(p.img, -p.w / 2, -h / 2, p.w, h);
      ctx.restore();
    }
    petalPhotos = petalPhotos.filter(p => p.alpha > 0);
  }

  // ── GESTURE 4: PINCH ─────────────────────────────────────────────────
  if (confirmedGesture === 'PINCH') {
    petalPhotos = []; orbitPhotos = [];
    spawnVortex(px, py);
    updateVortex(px, py, true);
    // central glow
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    const g = ctx.createRadialGradient(px, py, 0, px, py, 50);
    g.addColorStop(0, 'rgba(255,100,255,0.8)');
    g.addColorStop(1, 'rgba(80,0,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(px, py, 50, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  } else {
    updateVortex(px, py, false);
  }

  // ── GESTURE 5: THREE ─────────────────────────────────────────────────
  if (confirmedGesture === 'THREE') {
    petalPhotos = []; vortexPhotos = [];
    spawnOrbit(px, py);
    updateOrbit(px, py, true);
  } else {
    updateOrbit(px, py, false);
  }

  // always update trail and burst photos
  updateTrail();
  updateOrbPhotos();
  drawOrb();
}

// ── MediaPipe setup ────────────────────────────────────────────────────────
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,      // 0 = fastest
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.6
});
hands.onResults(results => {
  render(results.multiHandLandmarks);
});

// ── Camera ─────────────────────────────────────────────────────────────────
const camera = new Camera(video, {
  onFrame: async () => { await hands.send({ image: video }); },
  width: 1280,
  height: 720
});
camera.start().then(() => {
  statusDot.classList.add('ready');
}).catch(err => {
  console.error('Camera error:', err);
});
</script>
</body>
</html>
