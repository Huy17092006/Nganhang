<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hand Gesture Camera Effects</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: sans-serif;
  }
  #video {
    position: fixed;
    right: 12px;
    bottom: 12px;
    width: 180px;
    height: 135px;
    border-radius: 12px;
    border: 2px solid rgba(255,255,255,0.15);
    object-fit: cover;
    transform: scaleX(-1);
    z-index: 10;
    opacity: 0.85;
  }
  #mainCanvas {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    z-index: 1;
  }
  #status {
    position: fixed;
    top: 12px;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.35);
    font-size: 12px;
    z-index: 20;
    letter-spacing: 1px;
    pointer-events: none;
    transition: opacity 1s;
  }
</style>
</head>
<body>
<video id="video" autoplay muted playsinline></video>
<canvas id="mainCanvas"></canvas>
<div id="status">Đang tải...</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1632090166/camera_utils.js" crossorigin="anonymous"></script>

<script>
// ─── CONFIG ────────────────────────────────────────────────────────────────
const IMAGE_PATHS = [
  'images/photo1.webp','images/photo2.webp','images/photo3.webp',
  'images/photo4.webp','images/photo5.webp','images/photo6.webp',
  'images/photo7.webp','images/photo8.jpg'
];

// ─── CANVAS SETUP ─────────────────────────────────────────────────────────
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ─── LOAD IMAGES ──────────────────────────────────────────────────────────
const images = [];
let imagesLoaded = 0;
IMAGE_PATHS.forEach((src, i) => {
  const img = new Image();
  img.onload  = () => { imagesLoaded++; };
  img.onerror = () => { imagesLoaded++; };
  img.src = src;
  images.push(img);
});

// ─── PARTICLE / PHOTO SYSTEMS ──────────────────────────────────────────────
class PhotoParticle {
  constructor(x, y, imgIndex, opts = {}) {
    this.x  = x;  this.y  = y;
    this.vx = opts.vx || (Math.random()-0.5)*12;
    this.vy = opts.vy || (Math.random()-0.5)*12;
    this.w  = opts.w  || 80 + Math.random()*80;
    this.h  = this.w;
    this.alpha   = opts.alpha ?? 0;
    this.targetA = opts.targetA ?? 1;
    this.life    = opts.life ?? 1;
    this.decay   = opts.decay ?? 0.012;
    this.rot     = Math.random()*Math.PI*2;
    this.rotV    = (Math.random()-0.5)*0.08;
    this.img     = images[imgIndex % images.length];
    this.scale   = opts.scale ?? 1;
    this.gravity = opts.gravity ?? 0;
    this.fadeIn  = opts.fadeIn ?? true;
    this.done    = false;
  }
  update() {
    if (this.fadeIn && this.alpha < this.targetA) this.alpha += 0.05;
    this.vx *= 0.96; this.vy *= 0.96;
    this.vy += this.gravity;
    this.x  += this.vx; this.y += this.vy;
    this.rot += this.rotV;
    this.life -= this.decay;
    if (this.life <= 0) { this.done = true; return; }
    if (this.life < 0.3) this.alpha = this.life / 0.3 * this.targetA;
  }
  draw(c) {
    if (!this.img.complete || this.img.naturalWidth === 0) return;
    c.save();
    c.globalAlpha = Math.max(0, this.alpha);
    c.translate(this.x, this.y);
    c.rotate(this.rot);
    const hw = (this.w * this.scale)/2, hh = (this.h * this.scale)/2;
    c.drawImage(this.img, -hw, -hh, this.w * this.scale, this.h * this.scale);
    c.restore();
  }
}

class TrailDot {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.alpha = 1;
    this.r = 3 + Math.random()*4;
    this.done = false;
  }
  update() { this.alpha -= 0.035; if (this.alpha <= 0) this.done = true; }
  draw(c) {
    c.save();
    c.globalAlpha = this.alpha;
    const g = c.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*3);
    g.addColorStop(0,'rgba(255,220,100,1)');
    g.addColorStop(0.4,'rgba(255,100,180,0.6)');
    g.addColorStop(1,'rgba(100,80,255,0)');
    c.fillStyle = g;
    c.beginPath();
    c.arc(this.x, this.y, this.r*3, 0, Math.PI*2);
    c.fill();
    c.restore();
  }
}

class GlowOrb {
  constructor(x, y) {
    this.x = x; this.y = y;
    this.r  = 0; this.targetR = 70;
    this.alpha = 0;
    this.pulse = 0;
    this.active = true;
    this.imgIdx = 0;
  }
  update() {
    if (this.active) {
      this.r     += (this.targetR - this.r) * 0.15;
      this.alpha += (1 - this.alpha) * 0.1;
    } else {
      this.r     += (0 - this.r) * 0.12;
      this.alpha += (0 - this.alpha) * 0.12;
    }
    this.pulse += 0.08;
  }
  draw(c) {
    if (this.alpha < 0.01) return;
    const pulsed = this.r + Math.sin(this.pulse)*6;
    c.save();
    c.globalAlpha = this.alpha;
    // Glow
    const g = c.createRadialGradient(this.x,this.y,0,this.x,this.y,pulsed*1.8);
    g.addColorStop(0,'rgba(255,200,80,0.9)');
    g.addColorStop(0.3,'rgba(255,100,180,0.6)');
    g.addColorStop(0.7,'rgba(80,60,200,0.3)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle = g;
    c.beginPath();
    c.arc(this.x,this.y,pulsed*1.8,0,Math.PI*2);
    c.fill();
    // Inner sphere with rotating photos
    if (images[this.imgIdx] && images[this.imgIdx].complete && images[this.imgIdx].naturalWidth > 0) {
      c.save();
      c.beginPath();
      c.arc(this.x,this.y,pulsed,0,Math.PI*2);
      c.clip();
      c.drawImage(images[this.imgIdx % images.length], this.x-pulsed, this.y-pulsed, pulsed*2, pulsed*2);
      c.restore();
    }
    c.restore();
  }
}

// ─── STATE ────────────────────────────────────────────────────────────────
let particles  = [];
let trails     = [];
let orb        = null;
let prevGesture = '';
let fistHeld    = false;
let fistTimer   = null;
let imgCounter  = 0;

// trail gesture
let prevPointerPos = null;
let trailImgTimer  = null;
let trailImgIdx    = 0;

// gesture 3: pinch zoom orbit
let orbitParts = [];
let pinchActive = false;

// gesture 4: peace/V-sign — ripple gallery
let rippleActive = false;
let rippleTimer  = null;
let rippleWave   = [];

// gesture 5: thumbs-up — spiral burst
let spiralActive = false;

// ─── MEDIAPIPE HANDS ──────────────────────────────────────────────────────
const video   = document.getElementById('video');
const statusEl = document.getElementById('status');

let lastLandmarks = null;

const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1646424915/${f}`
});
hands.setOptions({
  maxNumHands: 1,
  modelComplexity: 0,       // 0 = fastest
  minDetectionConfidence: 0.6,
  minTrackingConfidence: 0.5
});
hands.onResults(onResults);

function startCamera() {
  const camera = new Camera(video, {
    onFrame: async () => { await hands.send({ image: video }); },
    width: 320, height: 240
  });
  camera.start();
}

navigator.mediaDevices.getUserMedia({ video: { width:320, height:240, facingMode:'user' }, audio: false })
  .then(stream => {
    video.srcObject = stream;
    statusEl.textContent = '';
    setTimeout(() => statusEl.style.opacity = '0', 2000);
    startCamera();
  })
  .catch(err => { statusEl.textContent = 'Cần cấp quyền camera'; console.error(err); });

// ─── GESTURE DETECTION ─────────────────────────────────────────────────────
function getLandmark(lm, idx) {
  const W = canvas.width, H = canvas.height;
  return { x: (1 - lm[idx].x) * W, y: lm[idx].y * H };
}

function fingerExtended(lm, tip, pip) {
  return lm[tip].y < lm[pip].y;
}
function fingerFolded(lm, tip, pip) {
  return lm[tip].y > lm[pip].y;
}
function thumbExtended(lm) {
  return lm[4].x < lm[3].x; // mirrored
}

function detectGesture(lm) {
  const index  = fingerExtended(lm, 8, 6);
  const middle = fingerExtended(lm, 12, 10);
  const ring   = fingerExtended(lm, 16, 14);
  const pinky  = fingerExtended(lm, 20, 18);
  const thumb  = Math.abs(lm[4].x - lm[3].x) > 0.04;

  const extCount = [index,middle,ring,pinky].filter(Boolean).length;

  // Fist: all folded
  if (!index && !middle && !ring && !pinky) return 'fist';
  // Open hand
  if (index && middle && ring && pinky) return 'open';
  // One finger (index only)
  if (index && !middle && !ring && !pinky) return 'one';
  // Pinch: thumb + index close, rest folded
  const t = lm[4], i8 = lm[8];
  const dist = Math.hypot(t.x-i8.x, t.y-i8.y);
  if (dist < 0.06 && !middle && !ring && !pinky) return 'pinch';
  // Peace/V: index + middle only
  if (index && middle && !ring && !pinky) return 'peace';
  // Thumbs up: thumb out, rest folded
  if (!index && !middle && !ring && !pinky && thumb) return 'thumbsup';

  return 'none';
}

function onResults(results) {
  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
    lastLandmarks = null;
    prevGesture = '';
    prevPointerPos = null;
    if (fistTimer) { clearTimeout(fistTimer); fistTimer = null; }
    return;
  }
  const lm = results.multiHandLandmarks[0];
  lastLandmarks = lm;
  const gesture = detectGesture(lm);
  handleGesture(gesture, lm);
  prevGesture = gesture;
}

// ─── GESTURE HANDLERS ─────────────────────────────────────────────────────
function handleGesture(gesture, lm) {
  const W = canvas.width, H = canvas.height;
  const wrist = getLandmark(lm, 0);

  // ── GESTURE 1: FIST → orb, OPEN → explode ────────────────────────────
  if (gesture === 'fist') {
    if (!fistHeld) {
      fistHeld = true;
      orb = new GlowOrb(wrist.x, wrist.y);
    } else if (orb) {
      orb.x = wrist.x; orb.y = wrist.y;
      orb.active = true;
      orb.imgIdx = Math.floor(Date.now()/600) % images.length;
    }
  }

  if (gesture === 'open' && prevGesture === 'fist' && orb) {
    const cx = orb.x, cy = orb.y;
    orb.active = false;
    fistHeld = false;
    // Explode photos
    for (let i = 0; i < images.length; i++) {
      const angle = (i / images.length) * Math.PI * 2;
      const speed = 8 + Math.random()*8;
      particles.push(new PhotoParticle(cx, cy, i, {
        vx: Math.cos(angle)*speed,
        vy: Math.sin(angle)*speed,
        w: 110 + Math.random()*60,
        decay: 0.006,
        gravity: 0.15,
        alpha: 0,
        targetA: 0.92,
        life: 1
      }));
    }
    // Extra random ones
    for (let i = 0; i < 6; i++) {
      particles.push(new PhotoParticle(
        cx + (Math.random()-0.5)*60,
        cy + (Math.random()-0.5)*60,
        Math.floor(Math.random()*images.length), {
        vx: (Math.random()-0.5)*16,
        vy: -Math.random()*14,
        w: 70 + Math.random()*50,
        decay: 0.008, gravity: 0.2, alpha:0, targetA:0.8
      }));
    }
  }
  if (gesture !== 'fist') { fistHeld = false; }

  // ── GESTURE 2: ONE FINGER TRAIL ───────────────────────────────────────
  if (gesture === 'one') {
    const tip = getLandmark(lm, 8);
    // Trail dots
    trails.push(new TrailDot(tip.x, tip.y));

    // Spawn image every ~40 trail dots
    if (!trailImgTimer || Date.now() - trailImgTimer > 380) {
      trailImgTimer = Date.now();
      particles.push(new PhotoParticle(tip.x, tip.y, trailImgIdx % images.length, {
        vx: (Math.random()-0.5)*2,
        vy: (Math.random()-0.5)*2,
        w: 90 + Math.random()*50,
        decay: 0.005, gravity: 0.05,
        alpha: 0, targetA: 0.85, life: 1,
        fadeIn: true
      }));
      trailImgIdx++;
    }
    prevPointerPos = tip;
  } else {
    prevPointerPos = null;
  }

  // ── GESTURE 3: PINCH → orbit ──────────────────────────────────────────
  if (gesture === 'pinch') {
    if (!pinchActive) {
      pinchActive = true;
      orbitParts = images.map((_, i) => ({
        img: images[i],
        angle: (i/images.length)*Math.PI*2,
        radius: 100 + Math.random()*60,
        speed: 0.04 + Math.random()*0.03,
        size: 75 + Math.random()*40,
        alpha: 0
      }));
    }
    const center = getLandmark(lm, 9);
    orbitParts.forEach(p => {
      p.angle += p.speed;
      p.alpha  = Math.min(1, p.alpha + 0.06);
      p.cx = center.x; p.cy = center.y;
    });
  } else if (pinchActive && prevGesture === 'pinch') {
    // release pinch: scatter
    orbitParts.forEach((p, i) => {
      const cx = p.cx || W/2, cy = p.cy || H/2;
      const vx = Math.cos(p.angle)*(6+Math.random()*6);
      const vy = Math.sin(p.angle)*(6+Math.random()*6);
      particles.push(new PhotoParticle(
        cx + Math.cos(p.angle)*p.radius,
        cy + Math.sin(p.angle)*p.radius, i, {
        vx, vy, w: p.size, decay:0.007, gravity:0.1, alpha:p.alpha, targetA:p.alpha
      }));
    });
    orbitParts = [];
    pinchActive = false;
  } else if (!pinchActive) {
    orbitParts = [];
  }

  // ── GESTURE 4: PEACE → ripple gallery ─────────────────────────────────
  if (gesture === 'peace' && prevGesture !== 'peace') {
    const origin = getLandmark(lm, 9);
    rippleWave = [];
    for (let ring = 0; ring < 3; ring++) {
      const count = (ring+1)*3;
      for (let j = 0; j < count; j++) {
        const angle = (j/count)*Math.PI*2;
        const rad   = 80 + ring*110;
        setTimeout(() => {
          particles.push(new PhotoParticle(
            origin.x + Math.cos(angle)*rad,
            origin.y + Math.sin(angle)*rad,
            (ring*count+j) % images.length, {
            vx: Math.cos(angle)*1.5,
            vy: Math.sin(angle)*1.5,
            w: 80 - ring*10,
            decay: 0.004, gravity: 0.0,
            alpha: 0, targetA: 0.88, life: 1
          }));
        }, ring * 160);
      }
    }
  }

  // ── GESTURE 5: THUMBS UP → spiral burst ───────────────────────────────
  if (gesture === 'thumbsup' && prevGesture !== 'thumbsup') {
    const center = getLandmark(lm, 4);
    const total = 24;
    for (let i = 0; i < total; i++) {
      setTimeout(() => {
        const angle = (i/total)*Math.PI*6;
        const rad   = 20 + i*8;
        const px = center.x + Math.cos(angle)*rad;
        const py = center.y + Math.sin(angle)*rad;
        const vx = Math.cos(angle)*(3+i*0.2);
        const vy = Math.sin(angle)*(3+i*0.2) - 2;
        particles.push(new PhotoParticle(px, py, i % images.length, {
          vx, vy, w: 60 + i*2.5,
          decay: 0.005, gravity: 0.08,
          alpha: 0, targetA: 0.9, life: 1
        }));
      }, i * 40);
    }
  }
}

// ─── RENDER LOOP ──────────────────────────────────────────────────────────
function render() {
  requestAnimationFrame(render);
  const W = canvas.width, H = canvas.height;

  // Dim background (trail persistence)
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, 0, W, H);

  // Draw orb
  if (orb) { orb.update(); orb.draw(ctx); }

  // Draw orbit particles
  if (orbitParts.length) {
    orbitParts.forEach(p => {
      if (!p.img.complete || p.img.naturalWidth === 0) return;
      const x = p.cx + Math.cos(p.angle)*p.radius;
      const y = p.cy + Math.sin(p.angle)*p.radius;
      ctx.save();
      ctx.globalAlpha = p.alpha;
      ctx.translate(x, y);
      ctx.rotate(p.angle);
      ctx.drawImage(p.img, -p.size/2, -p.size/2, p.size, p.size);
      ctx.restore();
    });
  }

  // Draw trail dots
  trails.forEach(t => { t.update(); t.draw(ctx); });
  trails = trails.filter(t => !t.done);

  // Draw particles
  particles.forEach(p => { p.update(); p.draw(ctx); });
  particles = particles.filter(p => !p.done);

  // Keep particle count manageable
  if (particles.length > 120) particles.splice(0, particles.length - 120);
  if (trails.length > 200)    trails.splice(0, trails.length - 200);
}

render();
</script>
</body>
</html>
